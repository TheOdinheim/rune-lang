[package]
name = "rune-web"
version = "0.1.0"
edition = "2024"
description = "API gateway protection, HTTP governance, and web security for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-security = { path = "../rune-security" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha3 = "0.10"
hmac = "0.12"
rand = "0.8"
hex = "0.4"
regex = "1"
