[package]
name = "rune-detection"
version = "0.1.0"
edition = "2024"
description = "Anomaly detection, pattern matching, and threat sensing for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-permissions = { path = "../rune-permissions" }
rune-security = { path = "../rune-security" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
