[package]
name = "rune-truth"
version = "0.1.0"
edition = "2024"
description = "Output trustworthiness verification — confidence scoring, consistency, contradiction detection for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-provenance = { path = "../rune-provenance" }
rune-security = { path = "../rune-security" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha3 = "0.10"
hex = "0.4"
