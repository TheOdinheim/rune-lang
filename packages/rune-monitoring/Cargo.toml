[package]
name = "rune-monitoring"
version = "0.1.0"
edition = "2024"
description = "Health checks, metric collection, threshold alerting, SLA tracking, and system status for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-security = { path = "../rune-security" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
