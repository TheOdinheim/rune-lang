[package]
name = "rune-policy-ext"
version = "0.1.0"
edition = "2024"
description = "Policy versioning, composition, conflict detection, simulation, and lifecycle management for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-security = { path = "../rune-security" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
