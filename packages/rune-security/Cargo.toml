[package]
name = "rune-security"
version = "0.1.0"
edition = "2024"
description = "Threat modeling, vulnerability scoring, and security context for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-permissions = { path = "../rune-permissions" }
rune-identity = { path = "../rune-identity" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
