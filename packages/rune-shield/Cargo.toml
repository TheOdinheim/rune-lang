[package]
name = "rune-shield"
version = "0.1.0"
edition = "2024"
description = "AI inference immune system — active defense for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-permissions = { path = "../rune-permissions" }
rune-security = { path = "../rune-security" }
rune-privacy = { path = "../rune-privacy" }
rune-detection = { path = "../rune-detection" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
