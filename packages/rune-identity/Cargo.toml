[package]
name = "rune-identity"
version = "0.1.0"
edition = "2024"
description = "Identity and authentication system for the RUNE governance ecosystem"
license = "MIT"

[dependencies]
rune-lang = { path = "../..", default-features = false }
rune-permissions = { path = "../rune-permissions" }
rune-secrets = { path = "../rune-secrets" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
sha3 = "0.10"
hmac = "0.12"
rand = "0.8"
