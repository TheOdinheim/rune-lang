[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "rune-python"
version = "0.1.0"
description = "Python integration for the RUNE governance-first policy engine"
requires-python = ">=3.9"
dependencies = ["wasmtime>=23.0"]
license = {text = "MIT"}

[project.optional-dependencies]
dev = ["pytest>=7.0"]
